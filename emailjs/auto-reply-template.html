<!--
  同じテンプレート内の「Auto-Reply」タブに貼り付ける内容です。
  Auto-Replyを有効にし、宛先（To Email）を {{email}} に設定してください。
  こうすることで、フォーム送信時のsendForm()呼び出し1回で
  「会社宛の通知メール」と「お客様宛の自動返信メール」の両方が送信されます。

  件名（Subject）欄には下記をそのまま設定してください:
  架空工務店 お問い合わせありがとうございます
-->
<div style="font-family: 'Hiragino Mincho ProN', 'Yu Mincho', serif; background-color: #fdf8f0; padding: 32px 16px; color: #2e1c08;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width: 560px; margin: 0 auto; background-color: #ffffff; border: 1px solid #e8c88a;">
    <tr>
      <td style="background-color: #4a2e10; padding: 32px; text-align: center;">
        <p style="margin: 0; font-size: 11px; letter-spacing: 0.3em; color: #d4aa30; text-transform: uppercase;">
          Thank You
        </p>
        <h1 style="margin: 12px 0 0; font-size: 20px; color: #fdf8f0; font-weight: 500; letter-spacing: 0.1em;">
          架空工務店
        </h1>
      </td>
    </tr>

    <tr>
      <td style="padding: 32px;">
        <p style="margin: 0 0 20px; font-size: 14px; color: #2e1c08;">{{name}} 様</p>

        <p style="margin: 0 0 16px; font-size: 13px; line-height: 1.9; color: #6b4218;">
          このたびは架空工務店へお問い合わせいただき、誠にありがとうございます。<br />
          以下の内容にて承りました。担当者より通常2営業日以内にご連絡いたします。
        </p>

        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="border-collapse: collapse; font-size: 13px; margin: 24px 0;">
          <tr>
            <td style="width: 110px; padding: 12px 0; border-bottom: 1px solid #f5e6c8; color: #b88c18; vertical-align: top;">お問い合わせ種別</td>
            <td style="padding: 12px 0; border-bottom: 1px solid #f5e6c8; color: #2e1c08;">{{type}}</td>
          </tr>
        </table>

        <p style="margin: 0 0 8px; font-size: 12px; color: #b88c18; letter-spacing: 0.05em;">お問い合わせ内容</p>
        <div style="padding: 16px; background-color: #fdf8f0; border: 1px solid #f5e6c8; font-size: 13px; line-height: 1.9; color: #2e1c08; white-space: pre-wrap; margin-bottom: 24px;">{{message}}</div>

        <p style="margin: 0; font-size: 12px; line-height: 1.9; color: #8b5a20;">
          ※本メールは自動返信です。このメールに直接ご返信いただいても対応いたしかねます。<br />
          お急ぎの場合はお電話にてお問い合わせください。<br />
          TEL: 03-1111-1234（平日 9:00〜18:00）
        </p>
      </td>
    </tr>

    <tr>
      <td style="padding: 20px 32px; background-color: #f5e6c8; font-size: 11px; color: #8b5a20; text-align: center; letter-spacing: 0.05em;">
        架空工務店
      </td>
    </tr>
  </table>
</div>
