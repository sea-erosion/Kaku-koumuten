<!--
  EmailJSダッシュボードの「Content」タブに貼り付けるテンプレートです。
  宛先（To Email）は会社側のアドレスを固定で設定してください（{{email}}にはしないこと）。
  Reply Toには {{email}} を設定すると、お客様に直接返信できます。

  件名（Subject）欄には下記をそのまま設定してください:
  【架空工務店】お問い合わせ（{{type}}）- {{name}} 様
-->
<div style="font-family: 'Hiragino Mincho ProN', 'Yu Mincho', serif; background-color: #fdf8f0; padding: 32px 16px; color: #2e1c08;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width: 560px; margin: 0 auto; background-color: #ffffff; border: 1px solid #e8c88a;">
    <tr>
      <td style="background-color: #4a2e10; padding: 24px 32px;">
        <p style="margin: 0; font-size: 11px; letter-spacing: 0.3em; color: #d4aa30; text-transform: uppercase;">
          Contact Notification
        </p>
        <h1 style="margin: 8px 0 0; font-size: 20px; color: #fdf8f0; font-weight: 500; letter-spacing: 0.05em;">
          架空工務店 お問い合わせ通知
        </h1>
      </td>
    </tr>

    <tr>
      <td style="padding: 32px;">
        <p style="margin: 0 0 24px; font-size: 13px; line-height: 1.9; color: #6b4218;">
          Webサイトのお問い合わせフォームより、新しいご相談が届きました。内容をご確認のうえ、通常2営業日以内にご返信ください。
        </p>

        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="border-collapse: collapse; font-size: 13px;">
          <tr>
            <td style="width: 110px; padding: 12px 0; border-bottom: 1px solid #f5e6c8; color: #b88c18; vertical-align: top;">お名前</td>
            <td style="padding: 12px 0; border-bottom: 1px solid #f5e6c8; color: #2e1c08;">{{name}} 様</td>
          </tr>
          <tr>
            <td style="padding: 12px 0; border-bottom: 1px solid #f5e6c8; color: #b88c18; vertical-align: top;">メールアドレス</td>
            <td style="padding: 12px 0; border-bottom: 1px solid #f5e6c8; color: #2e1c08;">{{email}}</td>
          </tr>
          <tr>
            <td style="padding: 12px 0; border-bottom: 1px solid #f5e6c8; color: #b88c18; vertical-align: top;">電話番号</td>
            <td style="padding: 12px 0; border-bottom: 1px solid #f5e6c8; color: #2e1c08;">{{tel}}</td>
          </tr>
          <tr>
            <td style="padding: 12px 0; border-bottom: 1px solid #f5e6c8; color: #b88c18; vertical-align: top;">お問い合わせ種別</td>
            <td style="padding: 12px 0; border-bottom: 1px solid #f5e6c8; color: #2e1c08;">{{type}}</td>
          </tr>
        </table>

        <p style="margin: 24px 0 8px; font-size: 12px; color: #b88c18; letter-spacing: 0.05em;">お問い合わせ内容</p>
        <div style="padding: 16px; background-color: #fdf8f0; border: 1px solid #f5e6c8; font-size: 13px; line-height: 1.9; color: #2e1c08; white-space: pre-wrap;">{{message}}</div>
      </td>
    </tr>

    <tr>
      <td style="padding: 20px 32px; background-color: #f5e6c8; font-size: 11px; color: #8b5a20; text-align: center; letter-spacing: 0.05em;">
        架空工務店 Webサイト お問い合わせフォーム経由で自動送信されています
      </td>
    </tr>
  </table>
</div>
